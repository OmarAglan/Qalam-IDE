name: Build Qalam IDE

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    name: Windows portable build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Bootstrap, build, and package
        shell: pwsh
        run: .\scripts\bootstrap-windows.ps1 -SkipWinget
      - uses: actions/upload-artifact@v4
        with:
          name: Qalam-win64
          path: dist/Qalam-win64.zip

  linux:
    name: Linux build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libgl1-mesa-dev libxkbcommon-dev libxcb-cursor0 libxcb-cursor-dev libxcb-xinerama0 libxcb-xinerama0-dev
      - name: Install Qt
        run: |
          python -m pip install --upgrade pip aqtinstall
          python -m aqt install-qt -O "$HOME/Qt" linux desktop 6.10.2 gcc_64
      - name: Build
        run: |
          export QALAM_QT_DIR="$HOME/Qt/6.10.2/gcc_64"
          cmake -S . -B build/linux-release -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QALAM_QT_DIR"
          cmake --build build/linux-release --parallel

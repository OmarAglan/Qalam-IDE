name: Build Qalam IDE

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    name: Windows portable build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Bootstrap, build, and package
        shell: pwsh
        run: .\scripts\bootstrap-windows.ps1 -SkipWinget -BuildTests
      - uses: actions/upload-artifact@v4
        with:
          name: Qalam-win64
          path: dist/Qalam-win64.zip

  linux:
    name: Linux build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake qt6-base-dev qt6-base-dev-tools \
            libgl1-mesa-dev libxkbcommon-dev libxcb-cursor0 \
            libxcb-cursor-dev libxcb-xinerama0 libxcb-xinerama0-dev
      - name: Build
        run: |
          cmake -S . -B build/linux-release -DCMAKE_BUILD_TYPE=Release -DQALAM_BUILD_TESTS=ON
          cmake --build build/linux-release --parallel
          QT_QPA_PLATFORM=offscreen ctest --test-dir build/linux-release --output-on-failure
